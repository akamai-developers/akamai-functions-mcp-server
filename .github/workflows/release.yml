name: Release
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROGRAM_NAME: akamai-functions-mcp
  SPIN_VERSION: v3.6.2
jobs:
  build:
    name: Build plugin binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { goArch: "amd64", goOs: "linux" }
          - { goArch: "arm64", goOs: "linux" }
          - { goArch: "arm64", goOs: "darwin" }
          - { goArch: "amd64", goOs: "darwin" }
          - { goArch: "amd64", goOs: "windows" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set App Version as env var
        run: |
          RAW_VERSION="${{ github.ref_name }}"
          if [ "$RAW_VERSION" = "main" ]; then
            CLEAN_VERSION="canary"
          else
            CLEAN_VERSION="${RAW_VERSION#v}"
          fi

          echo "APP_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV
      - name: Build MCP Server Binary
        run: GOOS=${{ matrix.config.goOs }} GOARCH=${{ matrix.config.goArch }} go build -ldflags="-X 'main.Version=${{ env.APP_VERSION }}'" -o ${{ env.PROGRAM_NAME }} main.go

      - name: Archive Binary and Manifest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROGRAM_NAME}}-${{ matrix.config.goOs }}-${{ matrix.config.goArch }}
          path: |
            *.tar.gz

  package:
    name: Package MCP Server
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: set the release version (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "RELEASE_VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV
      - name: set the release version (main)
        if: github.ref == 'refs/heads/main'
        run: echo "RELEASE_VERSION=canary" >> $GITHUB_ENV

      - name: Download artifacts
        uses: actions/download-artifact@v4
      - name: Display structure of downloaded files
        run: ls -R
      - name: Gather all new release files
        run: |
          mkdir release-assets
          find . -name "*.tar.gz" -exec cp {} release-assets/ \;
          ls release-assets/

      # Handle versioned release
      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release create ${{ env.RELEASE_VERSION }} --title "${{ env.RELEASE_VERSION }}" --repo ${{ github.repository }} release-assets/*
        env:
          GH_TOKEN: ${{ github.token }}

      # Handle canary release
      - name: Delete canary release
        if: github.ref == 'refs/heads/main'
        run: gh release delete ${{ env.RELEASE_VERSION }} --repo ${{ github.repository }} --cleanup-tag || echo "Release not found, continuing..."
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Recreate canary release
        if: github.ref == 'refs/heads/main'
        run: gh release create ${{ env.RELEASE_VERSION }} --title "${{ env.RELEASE_VERSION }}" --prerelease --repo ${{ github.repository }} release-assets/*
        env:
          GH_TOKEN: ${{ github.token }}
